command: ['streamlit', 'run', 'app.py', '--server.port', '8000', '--server.address', '0.0.0.0']
env:
  - name: PGHOST
    value: "ep-hidden-mouse-d1gj4kga.database.us-west-2.cloud.databricks.com"
  - name: PGDATABASE
    value: "databricks_postgres"
  - name: PGUSER
    description: "Service principal client ID (auto-injected when Lakebase is added as resource)"
  - name: PGPORT
    value: "5432"
  - name: PGSSLMODE
    value: "require"
  - name: ENDPOINT_NAME
    description: "Lakebase endpoint path (auto-injected when Lakebase is added as resource)"
