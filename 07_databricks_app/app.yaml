command: ['streamlit', 'run', 'app.py', '--server.port', '8000', '--server.address', '0.0.0.0']
env:
  - name: PGHOST
    description: "Lakebase endpoint hostname (injected automatically when Lakebase is added as a resource)"
  - name: PGDATABASE
    value: "databricks_postgres"
  - name: PGUSER
    description: "Service principal client ID (injected automatically)"
  - name: PGPORT
    value: "5432"
  - name: PGSSLMODE
    value: "require"
  - name: ENDPOINT_NAME
    description: "Lakebase endpoint path (injected automatically)"
